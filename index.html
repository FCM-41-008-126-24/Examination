        <script>
            // The custom logic to handle the proximity opening
            AFRAME.registerComponent("auto-opener", {
                init: function () {
                    this.opened = false;
                },
                tick: function () {
                    const player = document.querySelector("#player-camera");
                    if (!player) return;

                    const playerPos = player.object3D.getWorldPosition(new THREE.Vector3());
                    const doorPos = this.el.object3D.getWorldPosition(new THREE.Vector3());
                    const distance = playerPos.distanceTo(doorPos);

                    if (distance < 3.5 && !this.opened) {
                        this.el.emit("open-door");
                        this.opened = true;
                    } else if (distance > 4.5 && this.opened) {
                        this.el.emit("close-door");
                        this.opened = false;
                    }
                }
            });
        </script>
